name: Lint

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'conftest.py'
      - 'pyproject.toml'
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run isort check
        run: isort --check-only --profile black src/ tests/ conftest.py

      - name: Run black check
        run: black --check src/ tests/ conftest.py

      - name: Run flake8
        run: flake8 src/ tests/ conftest.py
